name: Pipeline Cotacoes

on:
  schedule:
    # Roda de segunda a sexta às 14h UTC (11h no Horário de Brasília).
    - cron: "0 14 * * 1-5"
  workflow_dispatch: # Permite um botão de "Play" manual na interface do GitHub

jobs:
  executar-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar gerenciador uv e Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sincronizar dependencias
        run: uv sync

      - name: Executar orquestrador
        env:
          # Injeta os segredos configurados no repositório diretamente no ambiente
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HG_API_KEY: ${{ secrets.HG_API_KEY }}
        run: uv run main.py